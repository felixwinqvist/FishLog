<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiskeapp - Logga dina fångster</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0891b2;
            --primary-dark: #0e7490;
            --secondary: #0ea5e9;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .logo-icon {
            font-size: 32px;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin: 40px 0 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(8, 145, 178, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .image-upload {
            border: 3px dashed var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-main);
        }

        .image-upload:hover {
            border-color: var(--primary);
            background: var(--bg-hover);
        }

        .image-upload.has-image {
            padding: 0;
            border: 2px solid var(--primary);
        }

        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.4);
        }

        .btn-secondary {
            background: var(--bg-hover);
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .fish-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .fish-card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(8, 145, 178, 0.4);
        }

        .fish-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-main);
        }

        .fish-info {
            padding: 16px;
        }

        .fish-species {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .fish-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .detail-badge {
            background: var(--bg-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .filter-bar {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            max-width: 200px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-hover);
            border: none;
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .success-message {
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 2000;
            animation: slideIn 0.3s;
            font-weight: 600;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 12px;
            font-family: 'Poppins', sans-serif;
        }

        .delete-btn:hover {
            background: #991b1b;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                width: 100%;
                justify-content: center;
            }

            .nav-btn {
                flex: 1;
                font-size: 12px;
                padding: 8px 12px;
            }

            .section-title {
                font-size: 24px;
            }

            .collection-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🎣</span>
                <span>Fiskeapp</span>
            </div>
            <nav>
                <button class="nav-btn active" onclick="showView('add')">➕ Lägg till</button>
                <button class="nav-btn" onclick="showView('collection')">📦 Samling</button>
                <button class="nav-btn" onclick="showView('stats')">📊 Statistik</button>
            </nav>
        </div>
    </header>

    <div class="container">
        <!-- Add Fish View -->
        <div id="add" class="view active">
            <h2 class="section-title">🎣 Logga ny fångst</h2>
            
            <div class="card">
                <form id="addFishForm">
                    <div class="form-group">
                        <label>📸 Bild på fisken</label>
                        <div class="image-upload" id="imageUploadArea" onclick="document.getElementById('fishImage').click()">
                            <input type="file" id="fishImage" accept="image/*" style="display: none" onchange="previewImage(event)">
                            <img id="imagePreview" alt="Fish preview">
                            <div id="uploadText">
                                <p style="font-size: 48px; margin-bottom: 10px;">📷</p>
                                <p style="font-weight: 600;">Klicka för att ladda upp bild</p>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-top: 8px;">Eller dra och släpp en bild här</p>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>🐟 Fiskart</label>
                        <select id="fishSpecies" required>
                            <option value="">Välj fiskart...</option>
                            <option value="Abborre">Abborre</option>
                            <option value="Gädda">Gädda</option>
                            <option value="Gös">Gös</option>
                            <option value="Havsöring">Havsöring</option>
                            <option value="Lax">Lax</option>
                            <option value="Öring">Öring</option>
                            <option value="Sik">Sik</option>
                            <option value="Lake">Lake</option>
                            <option value="Braxen">Braxen</option>
                            <option value="Mört">Mört</option>
                            <option value="Torsk">Torsk</option>
                            <option value="Makrill">Makrill</option>
                            <option value="Sill">Sill</option>
                            <option value="Flundra">Flundra</option>
                            <option value="Piggvar">Piggvar</option>
                            <option value="Annan">Annan fiskart</option>
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>⚖️ Vikt (kg)</label>
                            <input type="number" id="fishWeight" step="0.01" min="0" placeholder="t.ex. 2.5" required>
                        </div>

                        <div class="form-group">
                            <label>📏 Längd (cm)</label>
                            <input type="number" id="fishLength" step="0.1" min="0" placeholder="t.ex. 45">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>📍 Plats</label>
                        <input type="text" id="fishLocation" placeholder="t.ex. Mälaren, Vättern, Östersjön..." required>
                    </div>

                    <div class="form-group">
                        <label>📅 Datum</label>
                        <input type="date" id="fishDate" required>
                    </div>

                    <div class="form-group">
                        <label>📝 Anteckningar (valfritt)</label>
                        <textarea id="fishNotes" rows="3" placeholder="Beskriv hur du fångade fisken, vad du använde för bete, väder, etc..."></textarea>
                    </div>

                    <button type="submit" class="btn">💾 Spara fångst</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 Rensa</button>
                </form>
            </div>
        </div>

        <!-- Collection View -->
        <div id="collection" class="view">
            <h2 class="section-title">📦 Min fiskesamling</h2>
            
            <div class="filter-bar">
                <label style="font-weight: 600; color: var(--text-secondary);">Filtrera:</label>
                <select id="filterSpecies" onchange="filterCollection()">
                    <option value="">Alla fiskar</option>
                </select>
                <select id="filterLocation" onchange="filterCollection()">
                    <option value="">Alla platser</option>
                </select>
                <select id="sortBy" onchange="filterCollection()">
                    <option value="date-desc">Nyast först</option>
                    <option value="date-asc">Äldst först</option>
                    <option value="weight-desc">Tyngst först</option>
                    <option value="weight-asc">Lättast först</option>
                </select>
            </div>

            <div id="collectionContainer" class="collection-grid"></div>
        </div>

        <!-- Statistics View -->
        <div id="stats" class="view">
            <h2 class="section-title">📊 Statistik</h2>
            
            <div class="stats-grid" id="statsContainer"></div>

            <h3 class="section-title" style="font-size: 24px; margin-top: 40px;">🏆 Dina största fångster</h3>
            <div id="topFishContainer"></div>

            <h3 class="section-title" style="font-size: 24px; margin-top: 40px;">📍 Populäraste platserna</h3>
            <div id="topLocationsContainer"></div>
        </div>
    </div>

    <!-- Fish Detail Modal -->
    <div id="fishModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // Initialize app
        let catches = JSON.parse(localStorage.getItem('fishCatches')) || [];
        
        // Set today's date as default
        document.getElementById('fishDate').valueAsDate = new Date();

        // Show/hide views
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(viewName).classList.add('active');
            event.target.classList.add('active');

            if (viewName === 'collection') {
                updateFilterOptions();
                displayCollection();
            } else if (viewName === 'stats') {
                displayStats();
            }
        }

        // Image preview
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    const uploadText = document.getElementById('uploadText');
                    const uploadArea = document.getElementById('imageUploadArea');
                    
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                    uploadArea.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        }

        // Add fish
        document.getElementById('addFishForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const imageFile = document.getElementById('fishImage').files[0];
            
            if (!imageFile) {
                alert('⚠️ Du måste ladda upp en bild av fisken!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const newCatch = {
                    id: Date.now(),
                    species: document.getElementById('fishSpecies').value,
                    weight: parseFloat(document.getElementById('fishWeight').value),
                    length: parseFloat(document.getElementById('fishLength').value) || null,
                    location: document.getElementById('fishLocation').value,
                    date: document.getElementById('fishDate').value,
                    notes: document.getElementById('fishNotes').value,
                    image: e.target.result,
                    timestamp: new Date().toISOString()
                };

                catches.push(newCatch);
                localStorage.setItem('fishCatches', JSON.stringify(catches));

                showSuccess('🎉 Fångst sparad!');
                resetForm();
                
                setTimeout(() => {
                    showView('collection');
                    document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                }, 1500);
            };
            reader.readAsDataURL(imageFile);
        });

        // Reset form
        function resetForm() {
            document.getElementById('addFishForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('uploadText').style.display = 'block';
            document.getElementById('imageUploadArea').classList.remove('has-image');
            document.getElementById('fishDate').valueAsDate = new Date();
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.textContent = message;
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }

        // Update filter options
        function updateFilterOptions() {
            const species = [...new Set(catches.map(c => c.species))];
            const locations = [...new Set(catches.map(c => c.location))];

            const speciesSelect = document.getElementById('filterSpecies');
            const locationSelect = document.getElementById('filterLocation');

            speciesSelect.innerHTML = '<option value="">Alla fiskar</option>';
            species.forEach(s => {
                speciesSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });

            locationSelect.innerHTML = '<option value="">Alla platser</option>';
            locations.forEach(l => {
                locationSelect.innerHTML += `<option value="${l}">${l}</option>`;
            });
        }

        // Filter and display collection
        function filterCollection() {
            const speciesFilter = document.getElementById('filterSpecies').value;
            const locationFilter = document.getElementById('filterLocation').value;
            const sortBy = document.getElementById('sortBy').value;

            let filtered = catches.filter(c => {
                if (speciesFilter && c.species !== speciesFilter) return false;
                if (locationFilter && c.location !== locationFilter) return false;
                return true;
            });

            // Sort
            filtered.sort((a, b) => {
                switch(sortBy) {
                    case 'date-desc': return new Date(b.date) - new Date(a.date);
                    case 'date-asc': return new Date(a.date) - new Date(b.date);
                    case 'weight-desc': return b.weight - a.weight;
                    case 'weight-asc': return a.weight - b.weight;
                    default: return 0;
                }
            });

            displayCollection(filtered);
        }

        // Display collection
        function displayCollection(fishList = catches) {
            const container = document.getElementById('collectionContainer');
            
            if (fishList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎣</div>
                        <h3>Ingen fångst ännu</h3>
                        <p>Börja logga dina fångster för att bygga din samling!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = fishList.map(fish => `
                <div class="fish-card" onclick="showFishDetail(${fish.id})">
                    <img src="${fish.image}" alt="${fish.species}" class="fish-image">
                    <div class="fish-info">
                        <div class="fish-species">${fish.species}</div>
                        <div class="fish-details">
                            <span class="detail-badge">⚖️ ${fish.weight} kg</span>
                            ${fish.length ? `<span class="detail-badge">📏 ${fish.length} cm</span>` : ''}
                            <span class="detail-badge">📍 ${fish.location}</span>
                            <span class="detail-badge">📅 ${new Date(fish.date).toLocaleDateString('sv-SE')}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Show fish detail modal
        function showFishDetail(id) {
            const fish = catches.find(c => c.id === id);
            if (!fish) return;

            const modal = document.getElementById('fishModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <img src="${fish.image}" alt="${fish.species}" style="width: 100%; border-radius: 12px; margin-bottom: 20px;">
                <h2 style="color: var(--primary); margin-bottom: 16px;">${fish.species}</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <div class="detail-badge" style="justify-content: center;">⚖️ ${fish.weight} kg</div>
                    ${fish.length ? `<div class="detail-badge" style="justify-content: center;">📏 ${fish.length} cm</div>` : '<div></div>'}
                </div>

                <div class="detail-badge" style="width: 100%; justify-content: center; margin-bottom: 12px;">
                    📍 ${fish.location}
                </div>
                <div class="detail-badge" style="width: 100%; justify-content: center; margin-bottom: 20px;">
                    📅 ${new Date(fish.date).toLocaleDateString('sv-SE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                </div>

                ${fish.notes ? `
                    <div style="background: var(--bg-main); padding: 16px; border-radius: 8px; margin-top: 20px;">
                        <strong style="color: var(--text-secondary); display: block; margin-bottom: 8px;">📝 Anteckningar:</strong>
                        <p style="line-height: 1.6;">${fish.notes}</p>
                    </div>
                ` : ''}

                <button class="delete-btn" onclick="deleteFish(${fish.id})">🗑️ Ta bort fångst</button>
            `;

            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('fishModal').classList.remove('active');
        }

        // Delete fish
        function deleteFish(id) {
            if (confirm('Är du säker på att du vill ta bort denna fångst?')) {
                catches = catches.filter(c => c.id !== id);
                localStorage.setItem('fishCatches', JSON.stringify(catches));
                closeModal();
                displayCollection();
                showSuccess('🗑️ Fångst borttagen');
            }
        }

        // Display statistics
        function displayStats() {
            if (catches.length === 0) {
                document.getElementById('statsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <h3>Ingen statistik ännu</h3>
                        <p>Börja logga fångster för att se din statistik!</p>
                    </div>
                `;
                document.getElementById('topFishContainer').innerHTML = '';
                document.getElementById('topLocationsContainer').innerHTML = '';
                return;
            }

            // Calculate stats
            const totalCatches = catches.length;
            const totalWeight = catches.reduce((sum, c) => sum + c.weight, 0);
            const avgWeight = totalWeight / totalCatches;
            const heaviestFish = Math.max(...catches.map(c => c.weight));
            const uniqueSpecies = [...new Set(catches.map(c => c.species))].length;
            const uniqueLocations = [...new Set(catches.map(c => c.location))].length;

            // Display main stats
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalCatches}</div>
                    <div class="stat-label">Totala fångster</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalWeight.toFixed(1)}</div>
                    <div class="stat-label">kg total vikt</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgWeight.toFixed(1)}</div>
                    <div class="stat-label">kg genomsnittsvikt</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${heaviestFish}</div>
                    <div class="stat-label">kg största fisken</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueSpecies}</div>
                    <div class="stat-label">olika arter</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueLocations}</div>
                    <div class="stat-label">olika platser</div>
                </div>
            `;

            // Top 5 fish by weight
            const topFish = [...catches].sort((a, b) => b.weight - a.weight).slice(0, 5);
            document.getElementById('topFishContainer').innerHTML = `
                <div class="card">
                    ${topFish.map((fish, index) => `
                        <div style="display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--bg-main); border-radius: 8px; margin-bottom: 12px; cursor: pointer;" onclick="showFishDetail(${fish.id})">
                            <div style="font-size: 32px; font-weight: 800; color: var(--primary); min-width: 40px;">#${index + 1}</div>
                            <img src="${fish.image}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                            <div style="flex: 1;">
                                <div style="font-weight: 700; font-size: 18px; margin-bottom: 4px;">${fish.species}</div>
                                <div style="color: var(--text-secondary); font-size: 14px;">
                                    ⚖️ ${fish.weight} kg • 📍 ${fish.location} • 📅 ${new Date(fish.date).toLocaleDateString('sv-SE')}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Top locations
            const locationCounts = {};
            catches.forEach(c => {
                locationCounts[c.location] = (locationCounts[c.location] || 0) + 1;
            });
            const topLocations = Object.entries(locationCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            document.getElementById('topLocationsContainer').innerHTML = `
                <div class="card">
                    ${topLocations.map(([location, count], index) => `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-main); border-radius: 8px; margin-bottom: 12px;">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <div style="font-size: 32px; font-weight: 800; color: var(--primary); min-width: 40px;">#${index + 1}</div>
                                <div>
                                    <div style="font-weight: 700; font-size: 18px;">📍 ${location}</div>
                                    <div style="color: var(--text-secondary); font-size: 14px; margin-top: 4px;">
                                        ${count} fångst${count > 1 ? 'er' : ''}
                                    </div>
                                </div>
                            </div>
                            <div style="background: var(--primary); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 700;">
                                ${count}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Close modal when clicking outside
        document.getElementById('fishModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Drag and drop for image upload
        const uploadArea = document.getElementById('imageUploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--primary)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = 'var(--border)';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border)';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const input = document.getElementById('fishImage');
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                
                previewImage({ target: input });
            }
        });
    </script>
</body>
</html>
